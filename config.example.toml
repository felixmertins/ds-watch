# ds-watch configuration.
# Copy to config.toml and adjust; config.toml is gitignored.

# Zones with approved CZDS access (order = processing order)
tlds = ["dev", "info", "org"]

[czds]
# TOML file with `username = "..."` and `password = "..."` (chmod 600)
credentials_file = "~/.config/ds-watch/credentials"
auth_url = "https://account-api.icann.org/api/authenticate"
api_base = "https://czds-api.icann.org"
# User-Agent is required by the CZDS API — keep the contact address in
user_agent = "ds-watch/0.2 (DNSSEC DS observatory; contact: felix@mertins.dev)"
# ToU §1.8: at most one download per zone per 24 h. Minimum interval in hours,
# can only be undercut with --force.
min_fetch_interval_hours = 20

[paths]
# relative to the repo root, or absolute
state_dir = "state"
events_dir = "events"
stats_dir = "stats"

[sanity]
# Quarantine the run if the DS line count drops below min_ratio * previous day
# (classic failure mode: truncated download → mass ds_removed)
min_ratio = 0.7
# Quarantine if the zone as a whole is suspiciously small
min_zone_lines = 10000

[git]
# Commit events/stats after each run
commit = true
# "auto" = sign if git user.signingkey is configured; otherwise true/false
sign = "auto"

[watchlist]
# Delegations whose DS changes are reported prominently
domains = ["mertins.dev"]

[alert]
# Email alerting: leave `to` empty to disable (log warnings only)
to = ""
from = "ds-watch@localhost"
smtp_host = "localhost"
smtp_port = 25
starttls = false
# optional TOML file with smtp_user / smtp_password (chmod 600)
credentials_file = ""
# also send mail on quarantine / grant expiry (403) / new ToU (409)
on_attention = true
